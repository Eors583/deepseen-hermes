services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: runtime
    image: deepseen-hermes:prod
    container_name: deepseen-hermes
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      HERMES_HOME: /opt/data
      HERMES_WEB_DIST: /app/hermes_cli/web_dist
      HERMES_ENABLE_PROJECT_PLUGINS: "1"
      HERMES_WEB_PASSWORD_AUTH: "1"
      DEEPSEEN_BASE_URL: ${DEEPSEEN_BASE_URL:-https://deepseen.ai/v1}
    expose:
      - "9119"
    volumes:
      - hermes_data:/opt/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/api/auth/status"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  hermes-web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: web
    image: deepseen-hermes-web:prod
    container_name: deepseen-hermes-web
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    ports:
      - "${HERMES_WEB_BIND:-0.0.0.0}:${HERMES_WEB_PORT:-9119}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  hermes_data:
