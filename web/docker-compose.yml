services:
  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${HERMES_AGENT_IMAGE:-deepseen/hermes-agent:prod}
    image: ${WEBUI_IMAGE:-hermes-web-ui-local:latest}
    container_name: ${WEBUI_CONTAINER_NAME:-hermes-webui}
    ports:
      - "${PORT:-6060}:${PORT:-6060}"
      - "${PREVIEW_FRONTEND_PORT:-8651}:8651"
      - "${XAI_OAUTH_PORT:-56121}:56121"
    volumes:
      - ${HERMES_DATA_DIR:-../hermes_data}:/home/agent/.hermes
      - ${HERMES_WEB_UI_DATA_DIR:-../hermes_data/hermes-web-ui}:/home/agent/.hermes-web-ui
    environment:
      - PORT=${PORT:-6060}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_WEB_UI_HOME=/home/agent/.hermes-web-ui
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GOOGLE_AI_BASE_URL=${GOOGLE_AI_BASE_URL:-}
      - YUNWU_GEMINI_API_KEY=${YUNWU_GEMINI_API_KEY:-}
      - YUNWU_GEMINI_BASE_URL=${YUNWU_GEMINI_BASE_URL:-}
      - DEEPSEEN_API_KEY=${DEEPSEEN_API_KEY:-}
      - DEEPSEEN_BASE_URL=${DEEPSEEN_BASE_URL:-}
      - FASTMOSS_API_KEY=${FASTMOSS_API_KEY:-}
    restart: unless-stopped
    stdin_open: true
    tty: true
